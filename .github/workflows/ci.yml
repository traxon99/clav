name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src/clav

      - name: Layered-import contract
        run: uv run lint-imports

      - name: Test
        run: uv run pytest --cov --cov-report=term-missing

      - name: Coverage gate - domain/ and risk rules (95%+, docs/11-testing.md)
        run: uv run pytest --cov=clav.domain --cov-report=term-missing --cov-fail-under=95 -q

      - name: Coverage gate - Epic 3 LLM/news/social/gate-approval code (85%+, Story 3.11)
        run: |
          uv run pytest \
            --cov=clav.integrations.llm --cov=clav.integrations.news --cov=clav.integrations.social \
            --cov=clav.domain.social --cov=clav.services.analyst_gateway --cov=clav.services.decision_journal \
            --cov-report=term-missing --cov-fail-under=85 -q

      - name: Chaos & degradation invariant suite (Story 3.11, required)
        run: uv run pytest tests/integration/test_epic3_chaos_invariants.py tests/integration/test_epic2_risk_invariants.py tests/integration/test_safety_invariants.py -q

      - name: Observability + dashboard smoke suites (Story 4.10, required)
        run: |
          uv run pytest tests/unit/test_ram_discipline.py tests/unit/test_health_monitor.py \
            tests/unit/test_alerting.py tests/unit/test_alert_channels.py \
            tests/integration/test_epic4_dashboard_smoke.py -q

      - name: Coverage gate - HealthMonitor, alerter, and Epic-4 web routers (90%+, Story 4.10)
        run: |
          uv run pytest \
            --cov=clav.services.health_monitor --cov=clav.services.alerting \
            --cov=clav.integrations.alerting --cov=clav.web.health_view --cov=clav.web.calibration \
            --cov=clav.web.routers.audit --cov=clav.web.routers.calibration \
            --cov=clav.web.routers.explanations --cov=clav.web.routers.portfolio \
            --cov=clav.web.routers.health \
            --cov-report=term-missing --cov-fail-under=90 -q

      - name: Chaos & isolation invariant suite (Epic 5, Story 5.8, required)
        run: uv run pytest tests/integration/test_epic5_chaos_invariants.py -q

      - name: Observability + dashboard smoke suites (Epic 5, Story 5.8, required)
        run: |
          uv run pytest tests/unit/test_ram_discipline.py tests/unit/test_web_reviews.py \
            tests/unit/test_web_calibration.py tests/integration/test_epic4_dashboard_smoke.py -q

      - name: Coverage gate - Epic 5 trade-review code (90%+, Story 5.8)
        run: |
          uv run pytest \
            --cov=clav.services.review --cov=clav.web.routers.reviews \
            --cov-report=term-missing --cov-fail-under=90 -q

      - name: Alembic upgrade/downgrade smoke test
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
        env:
          CLAV_DB_PATH: /tmp/clav_ci_migration_check.db
